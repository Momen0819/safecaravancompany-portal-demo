<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800&amp;family=Noto+Sans+Arabic:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#1f5aa8",
              "on-primary": "#ffffff",
              surface: "#f6f9fc",
              "on-surface": "#14233a",
              "on-surface-variant": "#5b6b80",
              outline: "#cdddee",
              "primary-container": "#e8f1fb"
            },
            borderRadius: {
              "DEFAULT": "0.5rem",
              "lg": "1rem",
              "xl": "1.5rem",
              "full": "9999px"
            },
            fontFamily: {
              headline: ["Noto Sans Arabic", "Public Sans", "sans-serif"],
              body: ["Noto Sans Arabic", "Public Sans", "sans-serif"],
              label: ["Noto Sans Arabic", "Public Sans", "sans-serif"]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            background-color: #f6f9fc;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .form-input-focus:focus-within {
            border-color: #1f5aa8;
            box-shadow: 0 0 0 1px #1f5aa8;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface min-h-screen flex flex-col items-center justify-start pb-10">
<!-- TopAppBar (Based on Shared Components JSON) -->
<header class="fixed top-0 w-full z-50 bg-white border-b border-[#cdddee] shadow-sm flex flex-row-reverse justify-between items-center px-4 py-3 h-16">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="local_shipping">local_shipping</span>
<h1 class="text-primary font-bold text-xl tracking-tight">القافلة الآمنة</h1>
</div>
<button aria-label="رجوع" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-[#e8f1fb] transition-colors">
<span class="material-symbols-outlined text-on-surface text-2xl rotate-180" data-icon="arrow_back">arrow_back</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-[420px] px-6 pt-24 flex flex-col gap-8">
<!-- Welcome Header -->
<section class="flex flex-col gap-2">
<h2 class="text-2xl font-bold text-on-surface">إنشاء حساب جديد</h2>
<p class="text-on-surface-variant leading-relaxed text-sm">
                سجّل بنفس رقم هاتفك المسجّل لدينا ليُربط حسابك بشحناتك تلقائياً
            </p>
</section>
<!-- Registration Form -->
<form class="flex flex-col gap-5">
<!-- Full Name -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold mr-1">الاسم الكامل</label>
<div class="relative flex items-center form-input-focus border border-outline rounded-xl bg-white px-4 h-12 transition-all">
<span class="material-symbols-outlined text-on-surface-variant ml-3" data-icon="person">person</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-sm placeholder:text-on-surface-variant/50" placeholder="أدخل اسمك الثلاثي" type="text"/>
</div>
</div>
<!-- Phone Number -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold mr-1">رقم الهاتف</label>
<div class="relative flex items-center form-input-focus border border-outline rounded-xl bg-white px-4 h-12 transition-all">
<span class="material-symbols-outlined text-on-surface-variant ml-3" data-icon="phone">phone</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-sm placeholder:text-on-surface-variant/50 text-left" dir="ltr" placeholder="09XXXXXXXX" type="tel"/>
</div>
<span class="text-[11px] text-on-surface-variant mr-1">إجباري، ويُستخدم للربط والدخول</span>
</div>
<!-- Email (Optional) -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold mr-1">البريد الإلكتروني (اختياري)</label>
<div class="relative flex items-center form-input-focus border border-outline rounded-xl bg-white px-4 h-12 transition-all">
<span class="material-symbols-outlined text-on-surface-variant ml-3" data-icon="mail">mail</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-sm placeholder:text-on-surface-variant/50 text-left" dir="ltr" placeholder="example@domain.com" type="email"/>
</div>
<span class="text-[11px] text-on-surface-variant mr-1">لاستعادة كلمة المرور</span>
</div>
<!-- Password -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold mr-1">كلمة المرور</label>
<div class="relative flex items-center form-input-focus border border-outline rounded-xl bg-white px-4 h-12 transition-all">
<span class="material-symbols-outlined text-on-surface-variant ml-3" data-icon="lock">lock</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-sm placeholder:text-on-surface-variant/50" id="password-field" placeholder="••••••••" type="password"/>
<button class="flex items-center justify-center p-1 text-on-surface-variant hover:text-primary" onclick="togglePassword('password-field')" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold mr-1">تأكيد كلمة المرور</label>
<div class="relative flex items-center form-input-focus border border-outline rounded-xl bg-white px-4 h-12 transition-all">
<span class="material-symbols-outlined text-on-surface-variant ml-3" data-icon="lock">lock</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-sm placeholder:text-on-surface-variant/50" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Terms & Conditions -->
<div class="flex items-start gap-3 mt-2 px-1">
<input class="mt-1 w-5 h-5 rounded border-outline text-primary focus:ring-primary/20" id="terms" type="checkbox"/>
<label class="text-xs leading-relaxed text-on-surface-variant" for="terms">
                    أوافق على <a class="text-primary font-semibold underline underline-offset-2" href="#">الشروط والأحكام</a> و<a class="text-primary font-semibold underline underline-offset-2" href="#">سياسة الخصوصية</a> والمواد الممنوعة.
                </label>
</div>
<!-- Submit Button -->
<button class="mt-4 w-full h-14 bg-primary text-white font-bold rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span>إنشاء الحساب</span>
<span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer Link -->
<footer class="flex items-center justify-center gap-1 py-4 text-sm">
<span class="text-on-surface-variant">لديك حساب بالفعل؟</span>
<a class="text-primary font-bold hover:underline" href="#">تسجيل الدخول</a>
</footer>
<!-- Decorative Asset (Subtle Background Element) -->
<div class="mt-4 opacity-10 flex justify-center">
<span class="material-symbols-outlined text-9xl" data-icon="local_shipping" style="font-variation-settings: 'FILL' 0, 'wght' 100;">local_shipping</span>
</div>
</main>
<!-- Bottom Nav Suppression Logic: Per "Semantic Shell" mandate, navigation is suppressed on this Transactional/Sign-up screen -->
<script>
        function togglePassword(fieldId) {
            const input = document.getElementById(fieldId);
            const button = input.nextElementSibling.querySelector('span');
            if (input.type === "password") {
                input.type = "text";
                button.innerText = "visibility_off";
            } else {
                input.type = "password";
                button.innerText = "visibility";
            }
        }

        // Add visual feedback to button on press
        const btn = document.querySelector('button[type="submit"]');
        btn.addEventListener('mousedown', () => btn.classList.add('scale-95'));
        btn.addEventListener('mouseup', () => btn.classList.remove('scale-95'));
        btn.addEventListener('mouseleave', () => btn.classList.remove('scale-95'));
    </script>
</body></html>
