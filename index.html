<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="refresh" content="0; url=screens/01-login.html" />
<title>القافلة الآمنة — بوابة العملاء</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;800&display=swap" rel="stylesheet" />
<style>
  html,body{height:100%;margin:0}
  body{font-family:'Noto Sans Arabic',sans-serif;background:linear-gradient(135deg,#1f5aa8,#16447f);
    color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
  .logo{width:84px;height:84px;border-radius:22px;background:rgba(255,255,255,.16);
    border:1px solid rgba(255,255,255,.25);display:grid;place-items:center;font-size:42px}
  h1{font-size:26px;font-weight:800;margin:0}
  p{opacity:.85;font-size:14px;margin:0}
  .spin{width:26px;height:26px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:s .8s linear infinite;margin-top:6px}
  @keyframes s{to{transform:rotate(360deg)}}
  a{color:#fff}
</style>
<script>location.replace('screens/01-login.html');</script>
</head>
<body>
  <div class="logo">✈️</div>
  <h1>القافلة الآمنة</h1>
  <p>جارٍ فتح بوابة العملاء…</p>
  <div class="spin"></div>
  <noscript><p><a href="screens/01-login.html">اضغط هنا للدخول</a></p></noscript>
</body>
</html>
